<!DOCTYPE html>
<html>
    <head>
        <style>
            body { font-family: Arial, sans-serif; margin: 20px; color: whitesmoke; background-color: #303239; }
            #result { white-space: pre-wrap; margin-top: 20px; }
            a { color: cyan;}
        </style>
    </head>
    <body>
        <h2>Condorcet Sorter</h2>

        <input type="file" multiple id="input_candidates" name="candidates" onchange="window.ingest()"/>

        <script>
            window.ingest = function() {
                // convert the input into a dictionary of contestants
                window.contestants = Array.from(document.getElementById("input_candidates").files).map(file => ({file, score: 0}));

                window.numRounds = 0;
                window.displayResults();

                if(Object.keys(window.contestants).length >= 2)
                {
                    window.makeMatchup();
                }
            }

            window.makeMatchup = function()
            {
                
                let optionA;
                let optionB;
                let urlA;
                let urlB;

                // pick two random options
                while(optionA === optionB)
                {
                    let keys = Object.keys(window.contestants);
                    optionA = keys[Math.floor(Math.random() * keys.length)];
                    optionB = keys[Math.floor(Math.random() * keys.length)]; 
                }
                


                // update the main voting <a>s to have proper code
                document.getElementById("optionA").innerText = window.contestants[optionA].file.name;

                // update the main voting <iframe>s to have proper content
                if(urlA)
                {
                    URL.revokeObjectURL(urlA);
                }
                window.urlA = URL.createObjectURL(window.contestants[optionA].file);
                document.getElementById("iframeA").src = window.urlA;

                // update the voting function to reflect its new payload
                window.optionA = function()
                {
                    window.contestants[optionA].score++;
                    window.numRounds++;
                    window.makeMatchup();
                    window.displayResults();
                }


                // update the main voting <a>s to have proper code
                document.getElementById("optionB").innerText = window.contestants[optionB].file.name;

                // update the main voting <iframe>s to have proper content
                if(urlB)
                {
                    URL.revokeObjectURL(urlB);
                }
                window.urlB = URL.createObjectURL(window.contestants[optionB].file);
                document.getElementById("iframeB").src = window.urlB;

                // update the voting function to reflect its new payload
                window.optionB = function()
                {
                    window.contestants[optionB].score++;
                    window.numRounds++;
                    window.makeMatchup();
                    window.displayResults();
                }
                
            }

            

            window.displayResults = function () {
                const sorted = [...window.contestants]
                    .sort((a, b) => b.score - a.score)
                    .map(c => `"${c.file.name}",${c.score}`);

                document.getElementById("standings").innerText =
                    `Rounds: ${window.numRounds}\n\n\n` +
                    sorted.join("\n");
            };
        </script>

        <div style="display: flex; flex-direction: row;">
            <button
                style="width: 45%; margin: 2.5%; border: 2.5vmin solid black; border-radius: 5%; outline: none; background-color: #46495C; cursor: pointer"
                onclick="window.optionA()"
            >
                <p style="margin-top: 3vmin;"> </p>
                <iframe
                    id="iframeA"
                    src="./README.md"
                    style="width: 100%; height: 50vh; border: none; "
                    title="File preview"
                ></iframe>
                <p style="margin-top: 1vmin;"> </p>
                <b style="font-size: 3.5vmin;"><a id="optionA" href="#" onclick="" style="margin: 5%">OPTION1 NOT INIT</a></b>
                <p style="margin-bottom: 1vmin;"> </p>
            </button>
            <button
                style="width: 45%; margin: 2.5%; border: 2.5vmin solid black; border-radius: 5%; outline: none; background-color: #46495C; cursor: pointer"
                onclick="window.optionB()"
            >
                <p style="margin-top: 3vmin;"> </p>
                <iframe
                    id="iframeB"
                    src="./Nicolas_de_Condorcet.png"
                    style="width: 100%; height: 50vh; border: none; "
                    title="File preview"
                ></iframe>
                <p style="margin-top: 1vmin;"> </p>
                <b style="font-size: 3.5vmin;"><a id="optionB" href="#" onclick="" style="margin: 5%">OPTION2 NOT INIT</a></b>
                <p style="margin-bottom: 1vmin;"> </p>
            </button>
        </div>

        <pre id="standings"></pre>
    </body>
</html>
