<!DOCTYPE html>
<html>
    <head>
        <meta charset='utf-8'>
        <title>Condorcet Sorter</title>
        <link rel="icon" href="./ExampleData/exampleImage.png" type="image/x-icon">
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

        <title>Condorcet Sorter</title>
        <meta charset="utf-8">
        <meta name="description" content="Sort and Rank elements via the Condorcet Method">
        <meta name="keywords" content="tools,sorting,ranking,multimedia">

        <meta property="og:title" content="Condorcet Sorter">
        <meta property="og:description" content="Sort and Rank elements via the Condorcet Method">
        <meta property="og:site_name" content="Condorcet Sorter">
        <meta property="og:url" content="condorcet.snailien.net">
        <meta property="og:image" content="./ExampleData/exampleImage.png">

        <meta itemprop="name" content="Condorcet Sorter">
        <meta itemprop="description" content="Sort and Rank elements via the Condorcet Method">
        <meta itemprop="image" content="./ExampleData/exampleImage.png">

        <meta name="twitter:card" content="Sort and Rank elements via the Condorcet Method">
        <meta name="twitter:url" content="condorcet.snailien.net">
        <meta name="twitter:title" content="Condorcet Sorter">
        <meta name="twitter:description" content="Sort and Rank elements via the Condorcet Method">
        <meta name="twitter:image" content="./ExampleData/exampleImage.png">

        <style>
            body { font-family: Arial, sans-serif; margin: 20px; color: whitesmoke; background-color: #303239; }
            #result { white-space: pre-wrap; margin-top: 20px; }
            a { color: cyan;}
        </style>


        <script type="module">
            import { Condorcet } from "./code/src/condorcet.js";
            window.main = new Condorcet(
                document.getElementById("input_candidates"), 
                document.getElementById("standings"),
                document.getElementById("optionA"),
                document.getElementById("previewA"),
                document.getElementById("optionB"),
                document.getElementById("previewB")
            );
        </script>

    </head>
    <body>
        <h2>Condorcet Sorter</h2>

        <input type="file" multiple id="input_candidates" name="candidates" onchange="window.main.ingest()"/>

        <div style="display: flex; flex-direction: row;">
            <div
                style="width: 45%; margin: 2.5%; border: 2.5vmin solid black; border-radius: 5%; outline: none; background-color: #46495C;"
                
            >
                <p style="margin-top: 3vmin;"> </p>
                <div id="previewA" style="width: 95%; height: 50vh; margin: 2%;"></div>
                <p style="margin-top: 1vmin;"> </p>
                <b style="font-size: 3.5vmin;"><a id="optionA" href="#" onclick="window.main.optionA()" style="margin: 5%">OPTION1 NOT INIT</a></b>
                <p style="margin-bottom: 1vmin;"> </p>
            </div>
            <div
                style="width: 45%; margin: 2.5%; border: 2.5vmin solid black; border-radius: 5%; outline: none; background-color: #46495C;"
                
            >
                <p style="margin-top: 3vmin;"> </p>
                <div id="previewB" style="width: 95%; height: 50vh; margin: 2%;"></div>
                <p style="margin-top: 1vmin;"> </p>
                <b style="font-size: 3.5vmin;"><a id="optionB" href="#" onclick="window.main.optionB()" style="margin: 5%">OPTION2 NOT INIT</a></b>
                <p style="margin-bottom: 1vmin;"> </p>
            </div>
        </div>

        <pre id="standings"></pre>
    </body>
</html>
